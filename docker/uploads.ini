; Custom PHP limits for the local WordPress dev environment.
; Loaded automatically from /usr/local/etc/php/conf.d/ by the official image.
; Fixes: "The uploaded file exceeds the upload_max_filesize directive in php.ini."

upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
